version: '3.8'

services:
  # Database Service
  db:
    image: postgres:15-alpine
    container_name: tempsense-db
    restart: always
    environment:
      POSTGRES_DB: tempsense
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tempsense"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Adminer (Database GUI)
  adminer:
    image: adminer
    container_name: tempsense-adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  # Backend API + TCP Server
  backend:
    build: ./backend
    container_name: tempsense-backend
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=tempsense
      - DB_USER=postgres
      - DB_PASS=postgres
      - PORT=3001
      - TCP_PORT=1024
      - JWT_SECRET=tempsense_secret_key_change_me
    ports:
      - "3001:3001"
      - "1024:1024"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend Dashboard
  frontend:
    build: ./frontend
    container_name: tempsense-frontend
    restart: always
    ports:
      - "81:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
